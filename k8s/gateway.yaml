apiVersion: v1
kind: Service
metadata:
  name: sorakai-gateway
  namespace: sorakai
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: http
  selector:
    app: sorakai-gateway
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sorakai-gateway
  namespace: sorakai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sorakai-gateway
  template:
    metadata:
      labels:
        app: sorakai-gateway
    spec:
      containers:
        - name: gateway
          image: sorakai-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: PORT
              value: "8000"
            - name: INGEST_SERVICE_URL
              value: http://sorakai-ingest.sorakai.svc.cluster.local:8001
            - name: RAG_SERVICE_URL
              value: http://sorakai-rag.sorakai.svc.cluster.local:8002
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "1"
