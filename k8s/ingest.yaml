apiVersion: v1
kind: Service
metadata:
  name: sorakai-ingest
  namespace: sorakai
spec:
  ports:
    - port: 8001
      targetPort: http
  selector:
    app: sorakai-ingest
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sorakai-ingest
  namespace: sorakai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sorakai-ingest
  template:
    metadata:
      labels:
        app: sorakai-ingest
    spec:
      containers:
        - name: ingest
          image: sorakai-ingest:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8001
          env:
            - name: PORT
              value: "8001"
            - name: REDIS_URL
              value: redis://redis.sorakai.svc.cluster.local:6379/0
            # Optional: point to in-cluster or external MLflow
            # - name: MLFLOW_TRACKING_URI
            #   value: http://mlflow.sorakai.svc.cluster.local:5000
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "1"
