apiVersion: v1
kind: Service
metadata:
  name: sorakai-rag
  namespace: sorakai
spec:
  ports:
    - port: 8002
      targetPort: http
  selector:
    app: sorakai-rag
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sorakai-rag
  namespace: sorakai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sorakai-rag
  template:
    metadata:
      labels:
        app: sorakai-rag
    spec:
      containers:
        - name: rag
          image: sorakai-rag:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8002
          env:
            - name: PORT
              value: "8002"
            - name: REDIS_URL
              value: redis://redis.sorakai.svc.cluster.local:6379/0
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "1"
